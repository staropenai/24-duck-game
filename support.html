<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f7a3a">
  <title>24 Duck Game 支持与反馈</title>
  <link rel="stylesheet" href="style.css?v=20260624_v09_app_store_readiness">
</head>
<body>
  <main class="app legal-page">
    <header>
      <div>
        <h1>支持与反馈</h1>
        <p>这是家庭数学练习游戏的候选版本，不是已上架版本。</p>
      </div>
      <span class="badge">support</span>
    </header>

    <section class="panel">
      <h2>遇到问题时先检查</h2>
      <ul class="plain-list">
        <li>如果牌面没有显示照片，请刷新页面或重新打开链接。</li>
        <li>如果没有声音，请先点“开启音效”。浏览器不允许自动播放声音。</li>
        <li>如果提交失败，确认已经点了四张牌，并且每张牌只用一次。</li>
        <li>如果页面显示旧版本，请清除浏览器缓存或重新安装到主屏幕。</li>
      </ul>
    </section>

    <section class="panel">
      <h2>反馈内容建议</h2>
      <p>请记录设备型号、浏览器、出现问题的截图、当前四张牌和你点击的算式。这样更容易复现和修复。</p>
      <p><a href="index.html">返回游戏</a> · <a href="privacy.html">隐私说明</a></p>
    </section>
  </main>
</body>
</html>
